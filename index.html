<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee & Project Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Боковая панель (Сайдбар) -->
        <aside id="sidebar">
            <div id="sidebar-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Dashboard</h2>
                <button id="btn-toggle-sidebar">☰</button>
            </div>

            <!-- Селекторы периода -->
            <div id="period-selectors" style="margin-bottom: 20px; margin-top: 20px;">
                <label style="display:block; margin-bottom: 5px; font-size: 14px;">Select Period:</label>
                <select id="month-selector" style="margin-bottom: 10px;">
                    <option value="0">January</option>
                    <option value="1">February</option>
                    <option value="2">March</option>
                    <option value="3">April</option>
                    <option value="4">May</option>
                    <option value="5">June</option>
                    <option value="6">July</option>
                    <option value="7">August</option>
                    <option value="8">September</option>
                    <option value="9">October</option>
                    <option value="10">November</option>
                    <option value="11">December</option>
                </select>
                <select id="year-selector">
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                </select>
                <button id="btn-seed-data" style="margin-top: 10px;">Seed Data</button>
            </div>

            <nav id="sidebar-nav">
                <button id="btn-tab-projects" class="active">Projects</button>
                <button id="btn-tab-employees">Employees</button>
            </nav>

            <!-- Кнопка смены темы -->
            <button id="btn-toggle-theme" style="margin-top: 30px; background: #666;">Toggle Dark Mode</button>
        </aside>

        <!-- Основной контент -->
        <main id="main-content">
            <!-- Проекты -->
            <section id="projects-view">
                <h2>Projects</h2>
                <button id="btn-show-project-form">Add New Project</button>

                <form id="project-form" style="display: none; margin-bottom: 20px; padding: 15px; border: 1px solid #ccc;">
                    <h3>Create Project</h3>
                    <!-- pattern="[a-zA-Z0-9\s]+" означает только буквы и цифры (alphanumeric по ТЗ) -->
                    <input type="text" id="proj-company" placeholder="Company Name" required minlength="2" pattern="[a-zA-Z0-9\s]+">
                    <input type="text" id="proj-name" placeholder="Project Name" required minlength="3" pattern="[a-zA-Z0-9\s]+">
                    <input type="number" id="proj-budget" placeholder="Budget ($)" required min="0.01" step="0.01">
                    <input type="number" id="proj-capacity" placeholder="Employee Capacity" required min="1" step="1">

                    <button type="submit" id="btn-submit-project" disabled>Save Project</button>
                    <button type="button" id="btn-cancel-project">Cancel</button>
                </form>

                <table>
                    <thead>
                        <tr>
                            <th data-sort="companyName" data-table="projects">Company ⇅</th>
                            <th data-sort="projectName" data-table="projects">Project ⇅</th>
                            <th data-sort="budget" data-table="projects">Budget ⇅</th>
                            <th data-sort="employeeCapacity" data-table="projects">Employee Capacity ⇅</th>
                            <th>Employees</th>
                            <th>Estimated Income ⇅</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="projects-tbody">
                        <!-- Сюда JS будет вставлять строки с проектами -->
                    </tbody>
                </table>
                <!-- Место для Total Estimated Income -->
                 <div id="total-estimated-income" style="margin-top: 15px; font-weight: bold; font-size: 1.2em;"></div>
            </section>

            <!-- Сотрудники -->
            <section id="employees-view" style="display: none;">
                <h2>Employees</h2>
                <button id="btn-show-employee-form">Add New Employee</button>

                <form id="employee-form" style="display: none; margin-bottom: 20px; padding: 15px; border: 1px solid #ccc;">
                    <h3>Create Employee</h3>
                    <!-- pattern="[A-Za-z\s]+" означает только буквы (letters only по ТЗ) -->
                    <input type="text" id="emp-name" placeholder="Name" required minlength="3" pattern="[A-Za-z\s]+">
                    <input type="text" id="emp-surname" placeholder="Surname" required minlength="3" pattern="[A-Za-z\s]+">
                    <input type="date" id="emp-dob" required>

                    <select id="emp-position" required>
                        <option value="" disabled selected>Select Position...</option>
                        <option value="Junior">Junior</option>
                        <option value="Middle">Middle</option>
                        <option value="Senior">Senior</option>
                        <option value="Lead">Lead</option>
                        <option value="Architect">Architect</option>
                        <option value="BO">BO</option>
                    </select>

                    <input type="number" id="emp-salary" placeholder="Salary ($)" required min="0.01" step="0.01">

                    <button type="submit" id="btn-submit-employee" disabled>Save Employee</button>
                    <button type="button" id="btn-cancel-employee">Cancel</button>
                </form>

                <table>
                    <thead>
                        <tr>
                            <th data-sort="name" data-table="employees">Name ⇅</th>
                            <th data-sort="surname" data-table="employees">Surname ⇅</th>
                            <th>Age ⇅</th>
                            <th data-sort="position" data-table="employees">Position ⇅</th>
                            <th data-sort="salary" data-table="employees">Salary ⇅</th>
                            <th>Est. Payment ⇅</th>
                            <th>Project</th>
                            <th>Projected Income ⇅</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employees-tbody">
                        <!-- Сюда JS будет вставлять строки с сотрудниками -->
                    </tbody>
                </table>
            </section>

            <div id="assign-modal" class="modal" style="display: none;">
                <div class="modal-content">
                    <h3>Assign Employee</h3>
                    <p id="assign-emp-name" style="margin-bottom: 10px; font-weight: bold;"></p>
                    <select id="assign-project-select">
                        </select>
                    <button id="btn-confirm-assign" style="margin-top: 15px; background: #28a745; color: white;">Assign</button>
                    <button id="btn-close-assign-modal" style="margin-top: 5px;">Cancel</button>
                </div>
            </div>
        </main>     
    </div>

    <script src="script.js"></script>
</body>
</html>
